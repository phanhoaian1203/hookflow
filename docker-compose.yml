version: "3.9"

# =============================================================================
# HookFlow — Docker Compose
# Stack: ASP.NET Core 10 + React/Vite + PostgreSQL 16 + Nginx
# Version: 1.0-alpha (Docker Local MVP)
# =============================================================================

networks:
  hookflow-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Database chính
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hookflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hookflow-net

  # ---------------------------------------------------------------------------
  # Backend API — ASP.NET Core 10
  # ---------------------------------------------------------------------------
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: hookflow-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: >
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};
        Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-HookFlow}
      Jwt__Audience: ${JWT_AUDIENCE:-HookFlowUsers}
      Jwt__AccessTokenExpiryMinutes: ${JWT_ACCESS_EXPIRY:-60}
      Jwt__RefreshTokenExpiryDays: ${JWT_REFRESH_EXPIRY:-7}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175}
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hookflow-net

  # ---------------------------------------------------------------------------
  # Frontend — React 18 + Vite (Nginx SPA serving)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: hookflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend-api
    networks:
      - hookflow-net

